name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/*'

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Retrieve version
        id: version
        run: |
          version=`awk -F "=" '$1 == "releaseName" {print $2}' gradle.properties`
          count=`git rev-list --count HEAD`
          echo "version=$version-$count" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: arm64-v8a
            abis: arm64-v8a
            suffix: arm64-v8a
          - label: armeabi-v7a
            abis: armeabi-v7a
            suffix: armv7a
          - label: uni
            abis: arm64-v8a,armeabi-v7a, x86_64
            suffix: uni
          - label: x86_64
            abis: x86_64
            suffix: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          cmdline-tools-version: 14742923

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK 36
        run: |
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;36.1.0"

      - name: Restore release keystore
        env:
          BBZQ_KEYSTORE_BASE64: ${{ secrets.BBZQ_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$BBZQ_KEYSTORE_BASE64" ]; then
            mkdir -p signing
            printf '%s' "$BBZQ_KEYSTORE_BASE64" | base64 -d > signing/bbzq-release.jks
          fi

      - name: Export signing env
        env:
          RELEASE_STORE_FILE: signing/bbzq-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.BBZQ_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.BBZQ_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.BBZQ_KEY_PASSWORD }}
        run: |
          {
            echo "RELEASE_STORE_FILE=$RELEASE_STORE_FILE"
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD"
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS"
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Restore linker guard source
        env:
          LINKER_GUARD_SOURCE_B64: ${{ secrets.LINKER_GUARD_SOURCE_B64 }}
        run: |
          if [ -n "$LINKER_GUARD_SOURCE_B64" ]; then
            printf '%s' "$LINKER_GUARD_SOURCE_B64" | base64 -d > app/src/main/java/io/github/bbzq/LinkerGuard.kt
          fi

      - name: Build with gradle
        run: |
          chmod 777 ./gradlew
          tasks="assembleRelease"
          if [ "${{ matrix.label }}" = "uni" ]; then
            tasks="assembleDebug $tasks"
          fi
          ./gradlew --no-daemon --build-cache -PbbzqAbiFilters="${{ matrix.abis }}" -PbbzqOutputSuffix="${{ matrix.suffix }}" $tasks

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        if: success() && matrix.label == 'uni'
        with:
          name: bzzq-${{ env.VERSION }}-${{ matrix.label }}-debug
          path: 'app/build/outputs/apk/debug/*.apk'

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: bzzq-${{ env.VERSION }}-${{ matrix.label }}-release
          path: 'app/release/*.apk'
